spring.application.name=spring-la-mia-pizzeria-crud

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/la_mia_pizzeria?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

# allows method overriding using name="_method" value="delete" or other values
# by default HTML allow only GET and POST methods
spring.mvc.hiddenmethod.filter.enabled=true