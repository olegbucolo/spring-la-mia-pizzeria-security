<!DOCTYPE html>
<html lang="en">

<head>
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
    <title>Document</title>
</head>

<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <main class="container">
        <form th:action="@{'/pizzas/' + ${pizza.id}}" th:object="${pizza}" method="post">
            <div>
                <label for="name">Name</label>
                <input id="name" type="text" th:field="*{name}">
                <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div>
                <label for="description">Description</label>
                <input id="description" type="text" th:field="*{description}">
                <div class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>
            <div>
                <label for="price">Price</label>
                <input id="price" type="number" step="0.01" th:field="*{price}">
                <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>
            <input type="hidden" name="_method" value="put">
            <button type="submit">Salva pizza</button>
        </form>
    </main>
</body>

</html>
