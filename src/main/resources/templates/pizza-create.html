<!DOCTYPE html>
<html lang="en">

<head>
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
    <title>Document</title>
</head>

<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <main class="container pt-2">
        <form method="POST" th:action="@{/pizzas}" th:object="${pizza}">

            <div>
                <label for="name">NomeEe pizza</label>
                <input th:field="*{name}" id="name" type="text" required>

                <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div>
                <label for="description">Descrizione</label>
                <input th:field="*{description}" id="description" type="text">
                <div class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>

            <div>
                <label for="price">Prezzo</label>
                <input th:field="*{price}" id="price" type="number" step="0.01" required>
                <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>

         

            <h3>Aggiungi gli ingredienti desiderati</h3>
             <div th:each="ingredient : ${ingredients}">
                <label>
                    <input type="checkbox" name="ingredientIds" th:value="${ingredient.id}">
                    <span th:text="${ingredient.name}"></span>
                </label>
            </div>

            <button type="submit">Crea Nuova Pizza</button>

        </form>
    </main>
</body>

</html>
