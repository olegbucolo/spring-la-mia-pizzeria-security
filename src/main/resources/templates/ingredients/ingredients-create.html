<!DOCTYPE html>
<html lang="en">

<head>
    <th:block th:replace="~{fragments/styles :: styles}"></th:block>
    <title>Ingredients create</title>
</head>

<body>
    <th:block th:replace="~{fragments/header :: header}"></th:block>
    <main>
        <form class="mt-3" th:action="@{/ingredients}" th:object="${ingredient}" method="POST">
            <div class="d-flex">
                <div>
                    <label for="name">Nome Ingrediente</label>
                    <input th:field="*{name}" id="name" type="text">
                </div>
                
                <button class="ms-2" type="submit">Aggiungi Ingrediente</button>
            </div>
            <div class=" d-bslock text-danger"  th:if="@{#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </form>
    </main>
</body>

</html>
